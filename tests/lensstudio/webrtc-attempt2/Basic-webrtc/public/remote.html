<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC Remote</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Eater&family=Jolly+Lodger&family=Nosifer&display=swap"
      rel="stylesheet">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/remote.css">
  <link rel="stylesheet" href="./css/global.css">
  <style>

  </style>
</head>

<body>
  <div class="explanation" id="explanation">
    <h1 class="explanation__title nosifer">Spirit Sync</h1>
    <p class="explanation__text">When you click start, you will see a haunted room on your computer. 
    You can control a ghost</p>
    <button id="connectButton" class="start-button">Start</button>
  </div>

  <div class="game hidden" id="game">
    <div class="ghost">
      <h2 class="control__title">Ghost Movement</h2>
      <div class="ghost__swipe">
        <img class="swipe__ghost" id="ghost-swipe" src="./assets/ghost-control.svg" width="50">
        <div class="swipe__area" >
          <p>Swipe to move the ghost</p>
        </div>
      </div>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"
    integrity="sha512-0f7Ahsuvr+/P2btTY4mZIw9Vl23lS6LY/Y7amdkmUg2dqsUF+cTe4QjWvj/NIBHJoGksOiqndKQuI9yzn2hB0g=="
    crossorigin="anonymous"></script>
  <script type="module" src="./js/remote.js"></script>
</body>

</html>
