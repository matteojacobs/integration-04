<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebRTC</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Eater&family=Jolly+Lodger&family=Nosifer&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="./css/reset.css">
  <link rel="stylesheet" href="./css/index.css">
  <link rel="stylesheet" href="./css/global.css">
</head>

<body>
  <div class="welcome" id="welcome">
    <h1 class="welcome__title">Welcome to WebRTC</h1>
    <p class="welcome__sub">Scan the qr code with your phone to start the experience</p>
    <a class="welcome__url " id="url" href=""></a>
    <div class="welcome__qr" id="qr"></div>
  </div>
  <div class="game hidden" id="game">
    <picture>
      <source srcset="./assets/room.avif" type="image/avif">
      <img src="./assets/room.png" alt="Haunted room" class="room">
    </picture>

    <div class="objects">
      <picture class="ghost" id="ghost">
        <source srcset="./assets/ghost.avif" type="image/avif">
        <img src="./assets/ghost.png" alt="Ghost apparition" class="ghost" width="790">
      </picture>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/simple-peer/9.11.1/simplepeer.min.js"
    integrity="sha512-0f7Ahsuvr+/P2btTY4mZIw9Vl23lS6LY/Y7amdkmUg2dqsUF+cTe4QjWvj/NIBHJoGksOiqndKQuI9yzn2hB0g=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode-generator/1.4.4/qrcode.min.js"
    integrity="sha512-ZDSPMa/JM1D+7kdg2x3BsruQ6T/JpJo3jWDWkCZsP+5yVyp1KfESqLI+7RqB5k24F7p2cV7i2YHh/890y6P6Sw=="
    crossorigin="anonymous"></script>
 <script type="module" src="./js/script.js"></script>
</body>

</html>
