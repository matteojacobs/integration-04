<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>ml5 BlazePose + Three.js Elbow Cube</title>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: black;
    }

    #video {
      position: fixed;
      inset: 0;
      width: 100vw;
      height: 100vh;
      object-fit: cover;
      transform: scaleX(-1);
      z-index: 0;
    }

    #three-container {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    #debug {
      position: fixed;
      left: 12px;
      top: 12px;
      z-index: 2;
      color: white;
      font-family: monospace;
      background: rgba(0,0,0,0.6);
      padding: 8px 10px;
      border-radius: 8px;
      font-size: 13px;
    }
  </style>
</head>

<body>
  <video id="video" autoplay muted playsinline></video>
  <div id="three-container"></div>
  <div id="debug">Loading...</div>

  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>

  <script type="importmap">{
    "imports": {
      "three": "https://unpkg.com/three@0.156.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.156.0/examples/jsm/"
    }
  }</script>
  <script type="module" src="script.js"></script>
</body>

</html>
